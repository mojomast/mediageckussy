name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and publish example sites
        run: |
          npm run generate:example
          npm run publish:tv
          npm run generate:film
          npm run publish:film
          npm run generate:podcast
          npm run publish:podcast
          npm run generate:web
          npm run publish:web

      - name: Build Pages root
        run: |
          mkdir -p gh-pages-root
          cp -R deploy/neon-aftercare-site gh-pages-root/neon-aftercare
          cp -R deploy/glass-harbor-site gh-pages-root/glass-harbor
          cp -R deploy/signal-and-bone-site gh-pages-root/signal-and-bone
          cp -R deploy/soft-launch-site gh-pages-root/soft-launch
          cat > gh-pages-root/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Media Package Generator Demos</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 2rem; background: #11161d; color: #eef2f7; }
                a { color: #7dd3fc; }
                ul { line-height: 1.8; }
              </style>
            </head>
            <body>
              <h1>Media Package Generator Demo Sites</h1>
              <p>Generated from the sample canon files in this repository.</p>
              <ul>
                <li><a href="./neon-aftercare/">Neon Aftercare (TV)</a></li>
                <li><a href="./glass-harbor/">Glass Harbor (Feature Film)</a></li>
                <li><a href="./signal-and-bone/">Signal and Bone (Podcast)</a></li>
                <li><a href="./soft-launch/">Soft Launch (Web Series)</a></li>
              </ul>
            </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
